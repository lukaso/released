name = "released-web"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Static assets (self-hosted Geist fonts under /fonts/*.woff2).
# Keeps visitor IPs on our edge instead of googleapis/gstatic.
[assets]
directory = "./public"

# Set with: wrangler secret put GITHUB_TOKEN
# This is the SHARED server-side token. PAT-paste is per-user via X-User-Github-Token header.

# GitLab federation secrets (set via `wrangler secret put`):
#   GITLAB_TOKEN                       — gitlab.com PAT. Used for gitlab.com ONLY;
#                                        it is never sent to other instances
#                                        (GitLab PATs are instance-scoped — a
#                                        gitlab.com token 401s elsewhere and
#                                        leaks the secret to a third-party host).
#   GITLAB_TOKEN_GITLAB_GNOME_ORG      — per-host PAT (host uppercased, '.' '-' → '_')
#   GITLAB_TOKEN_GITLAB_FREEDESKTOP_ORG
#   ...etc
# A host with no matching per-host secret falls back to anonymous. Anonymous
# calls from Workers share the edge IP's budget and exhaust quickly, so set a
# per-host PAT for any instance you expect meaningful federation traffic to.

# Vars (non-secret config).
#   ANUBIS_HOSTS       — hosts routed through the relay container (below). These
#                        sit behind Anubis, which challenges workerd's TLS
#                        fingerprint; the relay (Node) gets through. An empty
#                        string disables the relay. Defaults are baked into
#                        src/relay.ts; set here to make it auditable + adjustable.
#   EXTRA_GITLAB_HOSTS — extend the known-GitLab-hosts allowlist with self-hosted
#                        instances, e.g. "git.example.com,gitlab.acme.net".
[vars]
ANUBIS_HOSTS = "gitlab.freedesktop.org,gitlab.gnome.org"
# EXTRA_GITLAB_HOSTS = "git.example.com,gitlab.acme.net"

# Anubis-bypass relay container.
# gitlab.freedesktop.org / gitlab.gnome.org sit behind Anubis (techaro.lol),
# which fingerprints the caller's TLS/HTTP2 stack BELOW the API-auth layer and
# challenges workerd. Node's fingerprint (the CLI) is not. This container runs
# that same Node fetch, so the Worker can relay blocked-host API calls through
# it. The Worker still runs the whole findRelease algorithm; the container only
# ferries raw upstream bytes, gated by RELAY_SECRET + an SSRF allowlist.
# Source: container/ + src/relay.ts.
#
# One-time setup:
#   wrangler secret put RELAY_SECRET            # shared Worker↔container secret
# CI note: the Cloudflare API token used by release.yml must include the
#   Containers (Cloudchamber) edit permission, and the deploy runner needs Docker
#   (GitHub-hosted ubuntu runners have it) to build the image.
[[containers]]
class_name = "GitlabRelay"
image = "./Dockerfile"
name = "released-gitlab-relay"
max_instances = 1

[[durable_objects.bindings]]
class_name = "GitlabRelay"
name = "RELAY"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GitlabRelay"]

# Usage tracking (server-side, no client JS). One data point per request; see
# src/analytics.ts for the schema and scripts/stats.mjs for the queries. The
# dataset is created automatically on first write — no manual provisioning.
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "released_events"

# Once web-og is deployed, uncomment to give web-og a service binding to this Worker:
# (configured FROM web-og's wrangler.toml — see packages/web-og/wrangler.toml)
