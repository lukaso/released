name = "released-web"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Static assets (self-hosted Geist fonts under /fonts/*.woff2).
# Keeps visitor IPs on our edge instead of googleapis/gstatic.
[assets]
directory = "./public"

# Set with: wrangler secret put GITHUB_TOKEN
# This is the SHARED server-side token. PAT-paste is per-user via X-User-Github-Token header.

# GitLab federation secrets (set via `wrangler secret put`):
#   GITLAB_TOKEN                       — default GitLab PAT (gitlab.com)
#   GITLAB_TOKEN_GITLAB_GNOME_ORG      — per-host PAT (host uppercased, '.' '-' → '_')
#   GITLAB_TOKEN_GITLAB_FREEDESKTOP_ORG
#   ...etc
# Anonymous calls from Workers share the edge IP's budget and exhaust quickly,
# so a token is effectively required for any meaningful federation traffic.

# Optional: extend the known-GitLab-hosts allowlist with self-hosted instances.
# [vars]
# EXTRA_GITLAB_HOSTS = "git.example.com,gitlab.acme.net"

# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "released_events"

# Once web-og is deployed, uncomment to give web-og a service binding to this Worker:
# (configured FROM web-og's wrangler.toml — see packages/web-og/wrangler.toml)
