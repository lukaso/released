name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from package.json#packageManager — do not also
      # pass `version:` here, pnpm/action-setup errors on double-specification.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: pnpm lint

      # Build must run BEFORE typecheck/test: downstream workspace packages
      # (cli, web, web-og) import from @released/core, whose .d.ts is only
      # generated by the build. Without it, tsc reports "Cannot find module
      # '@released/core'" and cascading 'unknown' errors in catch handlers
      # that narrow on core's error classes.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: CLI Windows smoke (no gh installed)
        if: matrix.os == 'windows-latest'
        run: |
          node packages/cli/dist/cli.js --help
          node packages/cli/dist/cli.js garbage-input || exit 0
        shell: bash

  # Authoritative dependency CVE scan. Runs the SAME scripts/osv-check.sh the
  # pre-push hook runs locally (DRY) — but here it's the gate: High/Critical
  # fail the check. Local osv is warn-only (a contributor may lack the binary),
  # so this job guarantees every PR is scanned regardless of local setup.
  osv:
    name: osv dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install osv-scanner
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Scan dependencies (gate High/Critical)
        run: bash scripts/osv-check.sh

  # Authoritative secret scan. Runs the SAME scripts/secrets-scan.sh the
  # pre-commit (staged) + pre-push (history) hooks run locally. Here it scans
  # the FULL history (fetch-depth: 0) and gates the PR. Real .dev.vars secrets
  # are gitignored + never committed, so this is clean unless a token actually
  # lands in a tracked file.
  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan history for secrets
        run: bash scripts/secrets-scan.sh

  # Lint the shell scripts + git hooks and the workflow YAML itself. shellcheck
  # ships on GitHub's ubuntu runners; actionlint is fetched per-run (it also
  # runs shellcheck on the `run:` blocks below, so keep them tidy).
  meta-lint:
    name: shell + workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck scripts/*.sh .githooks/*

      - name: actionlint
        run: |
          VERSION=1.7.12
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/actionlint_${VERSION}_linux_amd64.tar.gz" | tar -xz actionlint
          ./actionlint -color

  # Contrast a11y pass in a real browser (chromium). Structural a11y runs in the
  # normal test job (jsdom + axe, no browser); this is the contrast layer jsdom
  # can't do. Gated by A11Y_BROWSER so it only runs here, not in the inner loop.
  a11y:
    name: a11y contrast (chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # web's tests import @released/core, whose .d.ts/dist comes from the build.
      - name: Build core
        run: pnpm --filter @released/core build

      - name: Install chromium
        run: pnpm --filter @released/web exec playwright install --with-deps chromium

      - name: Contrast scan
        env:
          A11Y_BROWSER: "1"
        run: pnpm --filter @released/web exec vitest run test/a11y-contrast.test.ts
