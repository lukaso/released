name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from package.json#packageManager — do not also
      # pass `version:` here, pnpm/action-setup errors on double-specification.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: pnpm lint

      # Build must run BEFORE typecheck/test: downstream workspace packages
      # (cli, web, web-og) import from @released/core, whose .d.ts is only
      # generated by the build. Without it, tsc reports "Cannot find module
      # '@released/core'" and cascading 'unknown' errors in catch handlers
      # that narrow on core's error classes.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: CLI Windows smoke (no gh installed)
        if: matrix.os == 'windows-latest'
        run: |
          node packages/cli/dist/cli.js --help
          node packages/cli/dist/cli.js garbage-input || exit 0
        shell: bash

  # Authoritative dependency CVE scan. Runs the SAME scripts/osv-check.sh the
  # pre-push hook runs locally (DRY) — but here it's the gate: High/Critical
  # fail the check. Local osv is warn-only (a contributor may lack the binary),
  # so this job guarantees every PR is scanned regardless of local setup.
  osv:
    name: osv dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install osv-scanner
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Scan dependencies (gate High/Critical)
        run: bash scripts/osv-check.sh
